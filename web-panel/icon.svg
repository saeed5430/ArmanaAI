<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="robotGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#667eea" flood-opacity="0.3"/>
    </filter>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" filter="url(#shadow)"/>

  <circle cx="256" cy="256" r="220" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4"/>
  <circle cx="256" cy="256" r="230" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

  <rect x="176" y="200" width="160" height="120" rx="30" fill="url(#robotGradient)" filter="url(#glow)"/>

  <rect x="196" y="120" width="120" height="90" rx="25" fill="url(#robotGradient)" filter="url(#glow)"/>

  <line x1="256" y1="90" x2="256" y2="120" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <circle cx="256" cy="80" r="12" fill="#f093fb" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>

  <circle cx="230" cy="155" r="14" fill="#667eea"/>
  <circle cx="282" cy="155" r="14" fill="#667eea"/>

  <circle cx="234" cy="151" r="5" fill="white" opacity="0.8"/>
  <circle cx="286" cy="151" r="5" fill="white" opacity="0.8"/>

  <path d="M 236 175 Q 256 190 276 175" fill="none" stroke="#667eea" stroke-width="4" stroke-linecap="round"/>

  <rect x="176" y="145" width="24" height="40" rx="10" fill="url(#robotGradient)"/>
  <rect x="312" y="145" width="24" height="40" rx="10" fill="url(#robotGradient)"/>

  <rect x="150" y="210" width="30" height="80" rx="15" fill="url(#robotGradient)"/>
  <rect x="332" y="210" width="30" height="80" rx="15" fill="url(#robotGradient)"/>

  <rect x="200" y="320" width="40" height="50" rx="15" fill="url(#robotGradient)"/>
  <rect x="272" y="320" width="40" height="50" rx="15" fill="url(#robotGradient)"/>

  <g transform="translate(220, 230)" filter="url(#glow)">
    <path d="M 36 20 Q 50 0 36 -15 Q 22 0 36 20" fill="#667eea" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" values="0 36 5;10 36 5;0 36 5" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M 36 -15 Q 50 -30 36 -45 Q 22 -30 36 -15" fill="#764ba2" opacity="0.4"/>
  </g>

  <text x="256" y="420" text-anchor="middle" font-family="Vazirmatn, Tahoma" font-size="48" font-weight="bold" fill="white" filter="url(#glow)">AI</text>

  <circle cx="140" cy="140" r="4" fill="rgba(255,255,255,0.4)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="370" cy="180" r="3" fill="rgba(255,255,255,0.4)">
    <animate attributeName="opacity" values="1;0.4;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="350" r="5" fill="rgba(255,255,255,0.3)">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="360" r="4" fill="rgba(255,255,255,0.3)">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.8s" repeatCount="indefinite"/>
  </circle>
</svg>
